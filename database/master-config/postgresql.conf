# Configuración adicional de PostgreSQL para replicación
# Este archivo es opcional y puede ser usado para configuración avanzada

# Configuración de conexiones
max_connections = 200
shared_buffers = 256MB

# Configuración de logging
log_statement = 'all'
log_duration = on

# Configuración de rendimiento
effective_cache_size = 768MB
maintenance_work_mem = 128MB

