version: '3.8'

# =============================================
# Docker Compose - Ecommerce Full Stack
# =============================================
# Incluye: PostgreSQL Master + Replica, Backend, Frontend, Jenkins
# =============================================

services:
  # =============================================
  # BASE DE DATOS - PostgreSQL Master (Escritura)
  # =============================================
  postgres-master:
    image: 'postgres:16'
    container_name: ecommerce-postgres-master
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c wal_keep_size=64
      -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # =============================================
  # BASE DE DATOS - PostgreSQL Replica (Lectura)
  # =============================================
  postgres-replica:
    build:
      context: ./database/replica-config
      dockerfile: Dockerfile
    container_name: ecommerce-postgres-replica
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5433:5432'
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      postgres-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ecommerce-network

  # =============================================
  # BACKEND - Spring Boot
  # =============================================
  backend:
    build:
      context: ./ecommerce-back-end
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # =============================================
  # FRONTEND - Next.js
  # =============================================
  frontend:
    build:
      context: ./ecommerce-frond-end-master
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: ecommerce-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - ecommerce-network
    restart: unless-stopped

  # =============================================
  # JENKINS - CI/CD
  # =============================================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: ecommerce-jenkins
    privileged: true
    user: root
    ports:
      - '8081:8080'
      - '50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ecommerce-network
    restart: unless-stopped

# =============================================
# VOLUMES
# =============================================
volumes:
  postgres_master_data:
    driver: local
  postgres_replica_data:
    driver: local
  jenkins_home:
    driver: local

# =============================================
# NETWORKS
# =============================================
networks:
  ecommerce-network:
    driver: bridge

